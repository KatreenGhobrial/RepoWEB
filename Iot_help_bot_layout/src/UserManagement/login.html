<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT HelpBot - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-lg p-8">

        <div class="text-center mb-6">
            <img src="../assets/IoTPic.png"
                 class="w-56 mx-auto mb-4"
                 alt="IoT HelpBot Logo">

            <h1 class="text-3xl font-bold text-slate-900">Login</h1>
            <p class="text-slate-500 mt-2">Login to IoT HelpBot</p>
        </div>

        <form id="loginForm" class="space-y-4">

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">
                    Username or Email
                </label>
                <input id="userInput"
                       type="text"
                       required
                       placeholder="Enter username or email"
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">
                    Password
                </label>
                <input id="passInput"
                       type="password"
                       required
                       placeholder="Enter password"
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <p id="loginMessage" class="text-sm"></p>

            <button type="submit"
                    class="w-full bg-slate-950 text-white py-3 rounded-xl font-bold hover:bg-slate-800">
                Login
            </button>

        </form>

        <p class="text-center mt-6 text-slate-500">
            Don’t have an account?
            <a href="register.html" class="text-blue-600 font-bold">Register</a>
        </p>

    </div>

    <script src="../users.js"></script>
    <script src="login.js"></script>

</body>
</html>
