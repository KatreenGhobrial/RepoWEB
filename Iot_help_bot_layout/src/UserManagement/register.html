<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT HelpBot - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-lg p-8">

        <div class="text-center mb-6">
            <img src="assets/IoTPic.png"
                 class="w-56 mx-auto mb-4"
                 alt="IoT HelpBot Logo">

            <h1 class="text-3xl font-bold text-slate-900">Register</h1>
            <p class="text-slate-500 mt-2">Create a demo account</p>
        </div>

        <form id="registerForm" class="space-y-4">

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">Username</label>
                <input id="userInput"
                       type="text"
                       required
                       placeholder="Enter username"
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">Email</label>
                <input id="mailInput"
                       type="email"
                       required
                       placeholder="Enter email"
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">Password</label>
                <input id="passInput"
                       type="password"
                       required
                       placeholder="Enter password"
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">Confirm Password</label>
                <input id="confirmInput"
                       type="password"
                       required
                       placeholder="Confirm password"
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-1">Date of Birth</label>
                <input id="dateInput"
                       type="date"
                       required
                       class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>

            <p id="registerMessage" class="text-sm"></p>

            <button type="submit"
                    class="w-full bg-slate-950 text-white py-3 rounded-xl font-bold hover:bg-slate-800">
                Register
            </button>

        </form>

        <p class="text-center mt-6 text-slate-500">
            Already have an account?
            <a href="login.html" class="text-blue-600 font-bold">Login</a>
        </p>

    </div>

    <script src="users.js"></script>
    <script src="register.js"></script>

</body>
</html>
